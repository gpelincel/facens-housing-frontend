<div class="min-h-full flex flex-col px-6 pt-10 pb-24">
  <!-- Back Button -->
  <div class="mb-6 flex items-center justify-between">
    <a routerLink="/" class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center text-gray-700 hover:bg-gray-100 transition-colors">
      <i class="fi fi-rr-angle-left mt-1 mr-0.5"></i>
    </a>
    <h1 class="text-lg font-bold text-gray-900">Cadastrar Locação</h1>
    <div class="w-10"></div> <!-- Spacer -->
  </div>

  <form #propertyForm="ngForm" (ngSubmit)="onSubmit(propertyForm)" class="flex flex-col gap-6">
    <!-- Title -->
    <div class="flex flex-col gap-1.5">
      <label for="title" class="text-xs font-bold text-gray-700 ml-1">Título do Anúncio</label>
      <input 
        type="text" 
        id="title"
        name="title"
        [(ngModel)]="property.title"
        required
        class="block w-full px-4 py-3.5 bg-gray-50 border border-gray-100 rounded-[20px] text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" 
        placeholder="Ex: Quarto individual próximo à Facens">
    </div>

    <!-- Description -->
    <div class="flex flex-col gap-1.5">
      <label for="description" class="text-xs font-bold text-gray-700 ml-1">Descrição</label>
      <textarea 
        id="description"
        name="description"
        [(ngModel)]="property.description"
        required
        rows="4"
        class="block w-full px-4 py-3.5 bg-gray-50 border border-gray-100 rounded-[20px] text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all resize-none" 
        placeholder="Descreva os detalhes da acomodação..."></textarea>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <!-- Price -->
      <div class="flex flex-col gap-1.5">
        <label for="price" class="text-xs font-bold text-gray-700 ml-1">Preço (Mensal)</label>
        <div class="relative">
          <span class="absolute left-4 inset-y-0 flex items-center text-gray-400 text-sm font-medium">R$</span>
          <input 
            type="number" 
            id="price"
            name="price"
            [(ngModel)]="property.price"
            required
            class="block w-full pl-10 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-[20px] text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" 
            placeholder="0,00">
        </div>
      </div>

      <!-- Distance -->
      <div class="flex flex-col gap-1.5">
        <label for="distance" class="text-xs font-bold text-gray-700 ml-1">Distância (km)</label>
        <div class="relative">
          <input 
            type="number" 
            id="distance"
            name="distance"
            [(ngModel)]="property.distance"
            required
            step="0.1"
            class="block w-full px-4 py-3.5 bg-gray-50 border border-gray-100 rounded-[20px] text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" 
            placeholder="0.5">
          <span class="absolute right-4 inset-y-0 flex items-center text-gray-400 text-xs font-medium">km</span>
        </div>
      </div>
    </div>

    <!-- Location -->
    <div class="flex flex-col gap-1.5">
      <label for="location" class="text-xs font-bold text-gray-700 ml-1">Localização</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
          <i class="fi fi-rr-marker mt-1"></i>
        </div>
        <input 
          type="text" 
          id="location"
          name="location"
          [(ngModel)]="property.location"
          required
          class="block w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-[20px] text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" 
          placeholder="Ex: Jardim Santa Rosália, Sorocaba">
      </div>
    </div>

    <!-- Image URL -->
    <div class="flex flex-col gap-1.5">
      <label for="image_url" class="text-xs font-bold text-gray-700 ml-1">URL da Imagem</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
          <i class="fi fi-rr-picture mt-1"></i>
        </div>
        <input 
          type="text" 
          id="image_url"
          name="image_url"
          [(ngModel)]="property.image_url"
          required
          class="block w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-[20px] text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" 
          placeholder="https://exemplo.com/imagem.jpg">
      </div>
    </div>

    <!-- Owner Phone -->
    <div class="flex flex-col gap-1.5">
      <label for="owner_phone" class="text-xs font-bold text-gray-700 ml-1">WhatsApp de Contato (com DDD)</label>
      <div class="relative">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
          <i class="fi fi-rr-brand-whatsapp mt-1"></i>
        </div>
        <input 
          type="text" 
          id="owner_phone"
          name="owner_phone"
          [(ngModel)]="property.owner_phone"
          required
          class="block w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-[20px] text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" 
          placeholder="Ex: 5515998765432">
      </div>
    </div>

    <!-- Amenities -->
    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-bold text-gray-700 ml-1">Comodidades</label>
      <div class="flex gap-2">
        <input 
          type="text" 
          [(ngModel)]="amenityInput"
          name="amenityInput"
          class="flex-1 px-4 py-3 bg-gray-50 border border-gray-100 rounded-[20px] text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all" 
          placeholder="Ex: Wi-Fi, Lavanderia"
          (keyup.enter)="addAmenity()">
        <button 
          type="button"
          (click)="addAmenity()"
          class="px-4 bg-gray-100 text-gray-700 rounded-[20px] font-bold text-sm hover:bg-gray-200 transition-all">
          <i class="fi fi-rr-add mt-1"></i>
        </button>
      </div>
      
      <div class="flex flex-wrap gap-2 mt-2">
        @for (amenity of property.amenities; track $index) {
          <div class="flex items-center gap-1.5 px-3 py-1.5 bg-primary/5 text-primary rounded-full text-xs font-bold border border-primary/10">
            {{ amenity }}
            <button type="button" (click)="removeAmenity($index)" class="hover:text-red-500">
              <i class="fi fi-rr-cross-small mt-1"></i>
            </button>
          </div>
        }
      </div>
    </div>

    <!-- Submit Button -->
    <button 
      type="submit"
      [disabled]="isLoading() || propertyForm.invalid"
      class="w-full py-4 bg-primary text-white rounded-[20px] font-bold text-base shadow-lg shadow-primary/20 hover:bg-blue-900 transition-all active:scale-[0.98] mt-4 disabled:opacity-70 disabled:cursor-not-allowed">
      @if (isLoading()) {
        <span class="inline-block animate-spin mr-2">
          <i class="fi fi-rr-spinner mt-1"></i>
        </span>
        Cadastrando...
      } @else {
        Publicar Anúncio
      }
    </button>
  </form>
</div>

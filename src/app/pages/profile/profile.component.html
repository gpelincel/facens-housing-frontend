<div class="relative pb-24">
  <!-- Header with Gradient -->
  <div class="h-48 bg-gradient-to-b from-primary to-blue-600 relative overflow-hidden">
    <div class="absolute top-[-50px] right-[-50px] w-48 h-48 bg-white/10 rounded-full"></div>
    <div class="absolute bottom-[-20px] left-[-30px] w-32 h-32 bg-white/10 rounded-full"></div>
    
    <div class="absolute top-0 left-0 right-0 z-20 flex justify-between items-center px-4 py-8">
      <h1 class="text-white font-bold text-lg ml-2">Meu Perfil</h1>
      <button (click)="logout()" class="w-10 h-10 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center text-white border border-white/30 hover:bg-white/30 transition-colors">
        <i class="fi fi-rr-exit mt-1 ml-0.5"></i>
      </button>
    </div>
  </div>

  @if (!isLoading() && user!() !== null) {
    <!-- Profile Content Overlap -->
    <div class="px-6 -mt-16 relative z-10">
      <!-- Profile Header Card -->
      <div class="flex flex-col items-center mb-8">
        <div class="w-32 h-32 rounded-full border-4 border-white shadow-xl overflow-hidden bg-gray-100 mb-4 flex items-center justify-center">
          @if (userMetadata?.['avatar_url']) {
            <img [src]="userMetadata?.['avatar_url']" [alt]="userMetadata?.['full_name']" class="w-full h-full object-cover" />
          } @else {
            <i class="fi fi-rr-user text-4xl text-gray-300"></i>
          }
        </div>
        <h1 class="text-2xl font-bold text-gray-900 mb-0.5">{{ userMetadata?.['full_name'] || 'Usuário' }}</h1>
        <p class="text-gray-500 text-sm mb-2">{{ user!()?.email }}</p>
      </div>

      <!-- Stats / Info Card -->
      <div class="bg-white rounded-[24px] border border-gray-100 shadow-[0_4px_25px_rgba(0,0,0,0.04)] p-5 mb-8">
        <div class="space-y-5">
          <app-stat-row icon="fi-rr-envelope" label="E-mail verificado" [value]="user!()?.email_confirmed_at ? 'Sim' : 'Não'"></app-stat-row>
          <app-stat-row icon="fi-rr-shield-check" label="Tipo de conta" value="Estudante / Anunciante"></app-stat-row>
        </div>
      </div>

      <!-- Quick Actions -->
      <div class="grid grid-cols-1 gap-4 mb-8">
        <a routerLink="/add-property" class="flex items-center gap-4 p-4 bg-gray-50 rounded-2xl border border-gray-100 hover:bg-gray-100 transition-colors">
          <div class="w-10 h-10 bg-primary/10 rounded-xl flex items-center justify-center text-primary">
            <i class="fi fi-rr-add mt-1"></i>
          </div>
          <div class="flex-1">
            <p class="text-sm font-bold text-gray-900">Anunciar Imóvel</p>
            <p class="text-[11px] text-gray-500">Publique uma nova vaga ou quarto</p>
          </div>
          <i class="fi fi-rr-angle-small-right text-gray-400"></i>
        </a>

        <button class="flex items-center gap-4 p-4 bg-gray-50 rounded-2xl border border-gray-100 hover:bg-gray-100 transition-colors">
          <div class="w-10 h-10 bg-blue-500/10 rounded-xl flex items-center justify-center text-blue-500">
            <i class="fi fi-rr-settings mt-1"></i>
          </div>
          <div class="flex-1 text-left">
            <p class="text-sm font-bold text-gray-900">Configurações</p>
            <p class="text-[11px] text-gray-500">Editar perfil e preferências</p>
          </div>
          <i class="fi fi-rr-angle-small-right text-gray-400"></i>
        </button>
      </div>
    </div>
  } @else if (isLoading()) {
    <div class="flex flex-col items-center justify-center pt-20">
      <div class="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
      <p class="text-gray-500 text-sm mt-4">Carregando perfil...</p>
    </div>
  }
</div>

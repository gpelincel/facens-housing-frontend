<div class="relative pb-10">
  <!-- Header with Gradient and Back Button -->
  <div class="h-48 bg-gradient-to-b from-primary to-blue-600 relative overflow-hidden">
    <!-- Abstract Shapes for the background -->
    <div class="absolute top-[-50px] right-[-50px] w-48 h-48 bg-white/10 rounded-full"></div>
    <div class="absolute bottom-[-20px] left-[-30px] w-32 h-32 bg-white/10 rounded-full"></div>
    
    <div class="absolute top-0 left-0 right-0 z-20 flex justify-between items-center px-4 py-8">
      <a routerLink="/" class="w-10 h-10 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center text-white border border-white/30 hover:bg-white/30 transition-colors">
        <i class="fi fi-rr-angle-left mt-1 mr-0.5"></i>
      </a>
      <button class="w-10 h-10 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center text-white border border-white/30">
        <i class="fi fi-rr-menu-dots mt-1"></i>
      </button>
    </div>
  </div>

  <!-- Profile Content Overlap -->
  <div class="px-6 -mt-16 relative z-10">
    <!-- Profile Header Card -->
    <div class="flex flex-col items-center mb-8">
      <div class="w-32 h-32 rounded-full border-4 border-white shadow-xl overflow-hidden bg-gray-200 mb-4">
        <img [src]="owner.imageUrl" [alt]="owner.name" class="w-full h-full object-cover" />
      </div>
      <h1 class="text-2xl font-bold text-gray-900 mb-0.5">{{ owner.name }}</h1>
      <p class="text-gray-500 text-sm mb-2">{{ owner.role }}</p>
      
      <div class="flex items-center gap-1.5 px-3 py-1 bg-yellow-400/10 text-yellow-700 rounded-full border border-yellow-400/20">
        <i class="fi fi-rr-star text-xs mt-0.5 fill-current"></i>
        <span class="text-xs font-bold">{{ owner.rating }}</span>
        <span class="text-[10px] text-yellow-600">({{ owner.reviewsCount }} avaliações)</span>
      </div>
    </div>

    <!-- Stats Card -->
    <div class="bg-white rounded-[24px] border border-gray-100 shadow-[0_4px_25px_rgba(0,0,0,0.04)] p-5 mb-8">
      <div class="space-y-5">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center text-primary">
              <i class="fi fi-rr-calendar mt-1"></i>
            </div>
            <span class="text-sm font-medium text-gray-600">Membro desde</span>
          </div>
          <span class="text-sm font-bold text-gray-900">{{ owner.memberSince }}</span>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center text-primary">
              <i class="fi fi-rr-home mt-1"></i>
            </div>
            <span class="text-sm font-medium text-gray-600">Anúncios ativos</span>
          </div>
          <span class="text-sm font-bold text-gray-900">{{ owner.activeAds }} imóveis</span>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center text-primary">
              <i class="fi fi-rr-clock mt-1"></i>
            </div>
            <span class="text-sm font-medium text-gray-600">Tempo de resposta</span>
          </div>
          <span class="text-sm font-bold text-gray-900">{{ owner.responseTime }}</span>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-blue-50 flex items-center justify-center text-primary">
              <i class="fi fi-rr-phone-call mt-1"></i>
            </div>
            <span class="text-sm font-medium text-gray-600">Telefone</span>
          </div>
          <span class="text-sm font-bold text-gray-900">{{ owner.phone }}</span>
        </div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex flex-col gap-3 mb-8">
      <button class="w-full py-4 px-6 bg-primary text-white rounded-2xl font-bold text-sm shadow-lg shadow-primary/20 hover:bg-blue-900 transition-all active:scale-[0.98]">
        Enviar mensagem
      </button>
      <button class="w-full py-4 px-6 bg-white border border-primary text-primary rounded-2xl font-bold text-sm hover:bg-primary/5 transition-all active:scale-[0.98]">
        Ver anúncios deste anunciante
      </button>
    </div>

    <!-- About Section -->
    <div class="mb-8">
      <h3 class="text-base font-bold text-gray-900 mb-2">Sobre o anunciante</h3>
      <p class="text-gray-600 text-sm leading-relaxed">
        {{ owner.bio }}
      </p>
    </div>
  </div>
</div>

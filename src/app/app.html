<div class="mobile-container">
  <!-- Main content area -->
  <main class="flex-1 overflow-y-auto overflow-x-hidden relative custom-scrollbar">
    <router-outlet></router-outlet>
  </main>

  <!-- Bottom Navigation -->
  @if (isNotLoginPage()) {
    <nav class="flex-none bg-white border-t border-gray-100 h-[70px] flex items-center justify-around px-2 pb-safe shadow-[0_-2px_10px_rgba(0,0,0,0.03)]">
      <a routerLink="/" routerLinkActive="text-primary" [routerLinkActiveOptions]="{exact: true}" class="flex flex-col items-center justify-center text-gray-400 hover:text-primary transition-colors w-16 gap-1">
        <i class="fi fi-rr-home text-xl"></i>
        <span class="text-[10px] font-semibold">Início</span>
      </a>
      
      <a routerLink="/login" routerLinkActive="text-primary" class="flex flex-col items-center justify-center text-gray-400 hover:text-primary transition-colors w-16 gap-1">
        <i class="fi fi-rr-heart text-xl"></i>
        <span class="text-[10px] font-semibold">Salvar</span>
      </a>

      <a routerLink="/login" routerLinkActive="text-primary" class="flex flex-col items-center justify-center text-gray-400 hover:text-primary transition-colors w-16 gap-1">
        <i class="fi fi-rr-add text-xl"></i>
        <span class="text-[10px] font-semibold">Anunciar</span>
      </a>

      <a routerLink="/login" routerLinkActive="text-primary" class="flex flex-col items-center justify-center text-gray-400 hover:text-primary transition-colors w-16 gap-1">
        <i class="fi fi-rr-comment-alt text-xl"></i>
        <span class="text-[10px] font-semibold">Conversas</span>
      </a>      
      <a routerLink="/profile" routerLinkActive="text-primary" class="flex flex-col items-center justify-center text-gray-400 hover:text-primary transition-colors w-16 gap-1">
        <i class="fi fi-rr-user text-xl"></i>
        <span class="text-[10px] font-semibold">Perfil</span>
      </a>
    </nav>
  }

  <!-- PWA Install Prompt -->
  @if (showInstallPrompt()) {
    <div class="absolute bottom-24 left-4 right-4 z-50 transition-all duration-300 transform translate-y-0 opacity-100">
      <div class="bg-white rounded-[24px] p-4 shadow-[0_8px_30px_rgba(0,0,0,0.12)] border border-gray-100 flex flex-col gap-3">
        <div class="flex items-center gap-3">
          <img src="favicon.png" alt="Facens Housing" class="w-12 h-12 object-contain rounded-xl shrink-0">
          <div class="flex-1 min-w-0">
            <h3 class="font-bold text-sm text-gray-900 leading-tight">Facens Housing</h3>
            <p class="text-[10px] text-gray-500">Instale para acesso rápido e notificações.</p>
          </div>
          <button (click)="dismissInstallPrompt()" class="p-2 text-gray-400 hover:text-gray-600 transition-colors">
            <i class="fi fi-rr-cross-small text-lg"></i>
          </button>
        </div>

        @if (isIOS()) {
          <div class="bg-gray-50 rounded-xl p-3 flex items-center gap-3 border border-gray-100">
            <div class="flex flex-col gap-1">
              <p class="text-[10px] text-gray-600 leading-tight">
                Toque em <i class="fi fi-rr-share text-xs text-primary inline-block mx-0.5"></i> e depois em <strong>"Adicionar à Tela de Início"</strong> para instalar.
              </p>
            </div>
          </div>
        } @else {
          <button (click)="installApp()" class="w-full bg-primary text-white py-2.5 rounded-full text-xs font-bold hover:bg-blue-900 transition-colors shadow-md shadow-primary/10">
            Instalar Web App
          </button>
        }
      </div>
    </div>
  }
</div>

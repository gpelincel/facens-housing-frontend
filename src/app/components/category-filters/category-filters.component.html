<div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide -mx-4 px-4">
  @for (filter of filters; track filter.label) {
    <button 
      class="flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-medium whitespace-nowrap transition-colors border"
      [class]="filter.active 
        ? 'bg-primary text-white border-primary' 
        : 'bg-gray-100 text-gray-700 border-transparent hover:bg-gray-200'">
      <i class="fi mt-1" [class]="filter.icon"></i>
      {{ filter.label }}
    </button>
  }
</div>

<style>
  /* Hide scrollbar for Chrome, Safari and Opera */
  .scrollbar-hide::-webkit-scrollbar {
    display: none;
  }
  /* Hide scrollbar for IE, Edge and Firefox */
  .scrollbar-hide {
    -ms-overflow-style: none;  /* IE and Edge */
    scrollbar-width: none;  /* Firefox */
  }
</style>

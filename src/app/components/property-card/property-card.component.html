<div [routerLink]="['/property', property.id]" class="bg-white rounded-[20px] shadow-[0_4px_20px_rgba(0,0,0,0.05)] overflow-hidden mb-4 border border-gray-100 relative cursor-pointer active:scale-[0.98] transition-transform">
  <!-- Image container -->
  <div class="h-40 w-full relative bg-gray-200">
    <img [src]="property.imageUrl" [alt]="property.title" class="w-full h-full object-cover" />
    <!-- Favorite Button -->
    <button class="absolute top-3 right-3 w-8 h-8 bg-white/90 backdrop-blur-sm rounded-full flex items-center justify-center text-gray-700 hover:text-red-500 hover:bg-white transition-colors shadow-sm">
      <i class="fi fi-rr-heart mt-1"></i>
    </button>
  </div>
  
  <!-- Content -->
  <div class="p-4">
    <div class="flex justify-between items-start mb-1 gap-2">
      <h3 class="font-bold text-gray-900 text-sm truncate flex-1">{{ property.title }}</h3>
      <span class="font-bold text-primary text-sm whitespace-nowrap">R$ {{ property.price | number:'1.0-0':'pt-BR' }}/mês</span>
    </div>
    
    <div class="flex justify-between items-center text-gray-500 text-xs">
      <span class="truncate pr-2">{{ property.location }}</span>
      <span class="whitespace-nowrap">{{ property.distance | number:'1.1-1':'pt-BR' }} km da Facens</span>
    </div>
  </div>
</div>

<div [routerLink]="['/property', property.id]" class="bg-white rounded-[24px] shadow-[0_8px_30px_rgb(0,0,0,0.06)] overflow-hidden mb-5 border border-gray-100/50 relative cursor-pointer active:scale-[0.98] transition-all hover:shadow-[0_12px_40px_rgb(0,0,0,0.1)]">
  <!-- Image container -->
  <div class="h-44 w-full relative bg-gray-200">
    <img [src]="property.image_url" [alt]="property.title" class="w-full h-full object-cover" />
    
    <!-- Price Badge Overlapping Image for high contrast -->
    <div class="absolute bottom-3 left-3 bg-white/95 backdrop-blur-md px-3 py-1.5 rounded-xl shadow-sm border border-white/20">
      <span class="font-bold text-primary text-sm">R$ {{ property.price | number:'1.0-0':'pt-BR' }}<span class="text-[10px] font-medium text-gray-500">/mês</span></span>
    </div>

    <!-- Favorite Button -->
    <button (click)="$event.stopPropagation(); navigateToLogin()" class="absolute top-3 right-3 w-9 h-9 bg-white/90 backdrop-blur-md rounded-full flex items-center justify-center text-gray-800 hover:text-red-500 hover:bg-white transition-all shadow-md">
      <i class="fi fi-rr-heart mt-1 text-lg"></i>
    </button>
  </div>
  
  <!-- Content -->
  <div class="p-4 pt-5">
    <h3 class="font-bold text-gray-900 text-base mb-2 line-clamp-1">{{ property.title }}</h3>
    
    <div class="flex flex-col gap-2">
      <div class="flex items-center gap-1.5 text-gray-700 font-medium text-xs">
        <i class="fi fi-rr-marker text-primary/70 mt-0.5"></i>
        <span class="truncate">{{ property.location }}</span>
      </div>
      
      <div class="flex items-center justify-between mt-1 pt-3 border-t border-gray-50">
        <div class="flex items-center gap-1.5 text-gray-600 text-[11px] font-semibold">
          <i class="fi fi-rr-road text-primary/70 mt-0.5"></i>
          <span>{{ property.distance | number:'1.1-1':'pt-BR' }} km da Facens</span>
        </div>
        
        <!-- View details indicator -->
        <span class="text-primary text-[10px] font-bold uppercase tracking-wider">Ver detalhes</span>
      </div>
    </div>
  </div>
</div>
